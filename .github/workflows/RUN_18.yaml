name: RUN 18

on:
  workflow_dispatch:
    inputs:
      model:
        description: "LLM model to use (e.g., gpt-4o-mini)"
        type: choice
        required: true
        default: gpt-4o-mini
        options:
          - gpt-4o-mini
          - gpt-5-nano

jobs:
  run_experiment:
    name: RUN | gls_tsp | ${{ matrix.framework }} | repeat=${{ matrix.repeat }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        framework:
          - dual_ea
        repeat:
          - 1
          - 2
          - 3

    steps:
      - name: CHECKOUT PRIVATE REPO
        uses: actions/checkout@v4
        with:
          repository: HaiAu2501/BRIDGE
          token: ${{ secrets.CHECKOUT_TOKEN }}

      - name: SET UP PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: INSTALL DEPENDENCIES
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: RUN EXPERIMENT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python main.py \
            llm.model=${{ github.event.inputs.model }} \
            problem=gls_tsp \
            framework=${{ matrix.framework }}

      - name: PRINT func_best.py
        if: always()
        run: |
          BEST=$(find results/gls_tsp/ -name "func_best.py" -type f | head -1)
          if [ -z "$BEST" ]; then
            echo "func_best.py not found in results/gls_tsp/"
            find results/ -name "*.py" -type f || true
          else
            echo "Found: $BEST"
            echo "--- func_best.py ---"
            cat "$BEST"
          fi

      - name: UPLOAD RESULTS
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-gls_tsp-${{ matrix.framework }}-r${{ matrix.repeat }}-${{ github.run_id }}
          path: results/
          retention-days: 30